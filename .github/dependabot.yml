version: 2
updates:
  # npm(pnpm)の依存関係
  - package-ecosystem: 'npm' # pnpmでもnpmと書く
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 21
    open-pull-requests-limit: 2
    groups:
      all-dependencies:
        patterns:
          - '*'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    allow:
      - dependency-type: 'all'
    assignees:
      - 'Riku10145'

  # GitHub Actionsの依存関係
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 21
    open-pull-requests-limit: 1
    groups:
      all-actions:
        patterns:
          - '*'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    labels:
      - 'automated'
      - 'dependencies'
    allow:
      - dependency-type: 'all'
    assignees:
      - 'Riku10145'
